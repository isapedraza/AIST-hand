# Shadow Hand robot adapter configuration
#
# Canonical joint poses per grasp class are in:
#   shadow_hand_canonical.yaml
#
# Format: 24-DOF MuJoCo Menagerie (rh_WRJ2 ... rh_THJ1)
# Apertura interpolation:
#   qpos = (1 - apertura) * pose_open + apertura * pose_close
#
# Source: Dexonomy dataset (RSS 2025), P10/P90 flexion-score anchors.
# Extraction script: grasp-robot/scripts/extract_dexonomy_anchors.py

canonical_poses_file: shadow_hand_canonical.yaml

# Actuator names (MuJoCo Menagerie, same order as pose arrays)
actuator_joints:
  - rh_WRJ2
  - rh_WRJ1
  - rh_FFJ4
  - rh_FFJ3
  - rh_FFJ2
  - rh_FFJ1
  - rh_MFJ4
  - rh_MFJ3
  - rh_MFJ2
  - rh_MFJ1
  - rh_RFJ4
  - rh_RFJ3
  - rh_RFJ2
  - rh_RFJ1
  - rh_LFJ5
  - rh_LFJ4
  - rh_LFJ3
  - rh_LFJ2
  - rh_LFJ1
  - rh_THJ5
  - rh_THJ4
  - rh_THJ3
  - rh_THJ2
  - rh_THJ1
