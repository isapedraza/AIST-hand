_meta:
  anchor_method: pose_open = median of P10 percentile (flexion score); pose_close
    = median of P90 percentile
  apertura_convention: qpos = (1 - apertura) * pose_open + apertura * pose_close  [apertura
    in 0..1, 0=most open, 1=most closed]
