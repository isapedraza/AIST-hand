_meta:
  anchor_method: pose_open = medoid of pregrasp_qpos of 10 smallest-scale grasps;
    pose_close = medoid of squeeze_qpos of 10 smallest-scale grasps
  apertura_convention: qpos = (1 - apertura) * pose_open + apertura * pose_close  [apertura
    in 0..1, 0=most open, 1=most closed]
  joint_ordering: 'MuJoCo Menagerie (24 DOF): rh_WRJ2, rh_WRJ1, rh_FFJ4, rh_FFJ3,
    rh_FFJ2, rh_FFJ1, rh_MFJ4, rh_MFJ3, rh_MFJ2, rh_MFJ1, rh_RFJ4, rh_RFJ3, rh_RFJ2,
    rh_RFJ1, rh_LFJ5, rh_LFJ4, rh_LFJ3, rh_LFJ2, rh_LFJ1, rh_THJ5, rh_THJ4, rh_THJ3,
    rh_THJ2, rh_THJ1'
  source: Dexonomy (RSS 2025) – Shadow Hand IsaacGym grasps
